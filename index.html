<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supabase Notes – mini projekt</title>

  
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex justify-center p-6">
  <div class="w-full max-w-2xl">

    <h1 class="text-3xl font-bold mb-6 text-center">📝 Supabase Notes</h1>

    <!-- Új jegyzet -->
    <div class="bg-gray-800 p-5 rounded-2xl shadow-lg">
      <h2 class="text-xl font-semibold mb-4">Új jegyzet</h2>

      <form id="noteForm" class="flex flex-col gap-3">
        <input id="title"
          class="bg-gray-700 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Cím"
          required />

        <textarea id="content"
          class="bg-gray-700 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Jegyzet szövege"
          rows="5"
          required></textarea>

        <button
          class="bg-blue-600 hover:bg-blue-700 transition p-2 rounded-lg font-semibold">
          Mentés
        </button>
      </form>
    </div>

    <!-- Lista -->
    <div class="mt-6">
      <h2 class="text-xl font-semibold mb-3">Jegyzetek</h2>
      <div id="list" class="space-y-4"></div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://onnzomlakntzhjvmcptr.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_KEY_HERE";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const form = document.getElementById("noteForm");
    const listEl = document.getElementById("list");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    async function loadNotes() {
      const { data, error } = await supabaseClient
        .from("notes")
        .select("id, title, content, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        listEl.innerHTML = `<p class="text-red-400">Hiba: ${escapeHtml(error.message)}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        listEl.innerHTML = `<p class="text-gray-400">Még nincs jegyzet.</p>`;
        return;
      }

      listEl.innerHTML = data.map(note => `
        <div class="bg-gray-800 p-4 rounded-xl shadow border border-gray-700">
          <h3 class="text-lg font-bold mb-1">${escapeHtml(note.title)}</h3>
          <p class="text-gray-300 mb-2">${escapeHtml(note.content)}</p>
          <small class="text-gray-500">${escapeHtml(note.created_at)}</small>
        </div>
      `).join("");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();

      if (!title || !content) {
        alert("Minden mező kötelező!");
        return;
      }

      const { error } = await supabaseClient
        .from("notes")
        .insert([{ title, content }]);

      if (error) {
        alert("Hiba: " + error.message);
        return;
      }

      form.reset();
      loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
