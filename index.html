
<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supabase Notes – mini projekt</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; max-width: 800px; margin: 30px auto;">
  <h1>📝 Supabase Notes – mini projekt</h1>

  <h2>Új jegyzet</h2>
  <form id="noteForm" style="display:grid; gap:10px;">
    <input id="title" placeholder="Cím" required />
    <textarea id="content" placeholder="Jegyzet szövege" rows="5" required></textarea>
    <button type="submit">Mentés</button>
  </form>

  <hr />
  <h2>Jegyzetek</h2>
  <div id="list"></div>

  <script>
    const SUPABASE_URL = "https://lufaxcpkftegaolzmmpc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1ZmF4Y3BrZnRlZ2FvbHptbXBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzAxMTEsImV4cCI6MjA4ODEwNjExMX0.wtuLTFeOXxLXBqhFfnAUwKxX9pqVwspor01iA_Nf9oc";

    // Nevezzük át, hogy ne ütközzön a globális supabase objektummal
    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const form = document.getElementById("noteForm");
    const listEl = document.getElementById("list");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    async function loadNotes() {
      const { data, error } = await supabaseClient
        .from("notes")
        .select("id, title, content, created_at")
        .order("created_at", { ascending: false });

      console.log("SELECT:", data, error);

      if (error) {
        listEl.innerHTML = `<p style="color:red;">SELECT hiba: ${escapeHtml(error.message)}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        listEl.innerHTML = `<p>Még nincs egyetlen jegyzet sem.</p>`;
        return;
      }

      listEl.innerHTML = data.map(note => `
        <div style="border:1px solid #ccc; padding:10px; margin:10px 0;">
          <h3>${escapeHtml(note.title)}</h3>
          <p>${escapeHtml(note.content)}</p>
          <small>${escapeHtml(note.created_at)}</small>
        </div>
      `).join("");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();

      if (!title || !content) {
        alert("Mindkét mező kitöltése kötelező.");
        return;
      }

      console.log("Mentés indul:", { title, content });

      const { data, error } = await supabaseClient
        .from("notes")
        .insert([{ title, content }])
        .select();

      console.log("INSERT:", data, error);

      if (error) {
        alert("INSERT hiba: " + error.message);
        return;
      }

      alert("Sikeres mentés!");
      form.reset();
      loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
